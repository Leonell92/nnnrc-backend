name: Build Flet APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Python 3.11
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Install Flet 0.21.2
      - name: Install Flet
        run: |
          pip install flet==0.21.2
          flet --version

      # 4. Java 17 — required by package_info_plus and modern Android plugins
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 5. Flutter 3.19.6 — the stable release when Flet 0.21.2 shipped
      - name: Set up Flutter 3.19.6
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      # 6. Clear Flet/cookiecutter template cache to avoid stale build templates
      - name: Clear Flet template cache
        run: |
          rm -rf ~/.cookiecutters
          rm -rf ~/.flet
          echo "Cache cleared"

      # 7. Accept Android SDK licenses
      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      # 8. Flutter doctor (for debug info)
      - name: Flutter doctor
        run: flutter doctor -v

      # 9. Build the APK
      - name: Build APK
        run: |
          flet build apk \
            --project "Leo's NRC Automator" \
            --description "Automated NRC task completion bot by Leo Emmanuel" \
            --org com.nrcautomator.app \
            --build-number ${{ github.run_number }} \
            --build-version "1.0.${{ github.run_number }}"

      # 10. Find the APK (output path varies between Flet versions)
      - name: Locate APK
        if: always()
        run: |
          echo "=== Searching for APKs ==="
          find . -name "*.apk" 2>/dev/null
          echo "=== build/ directory ==="
          ls -la build/ 2>/dev/null || echo "no build dir"
          echo "=== dist/ directory ==="
          ls -la dist/ 2>/dev/null || echo "no dist dir"

      # 11. Upload APK artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nrc-automator-apk
          path: |
            build/apk/*.apk
            build/**/*.apk
            dist/**/*.apk
          if-no-files-found: warn
          retention-days: 30
